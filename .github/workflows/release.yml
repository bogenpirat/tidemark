name: Release

# Build a production binary and publish a GitHub Release whenever commits land
# on the default branch. Each push gets a fresh, unique tag derived from the
# version in versioninfo.json plus the workflow run number.
on:
  push:
    branches: ["main"]

# Allow the job to create tags and releases.
permissions:
  contents: write

jobs:
  package-macos:
    runs-on: macos-latest # Apple Silicon (arm64)
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install build tools
        run: |
          brew install librsvg
          go install github.com/magefile/mage@latest

      - name: Build and package macOS app
        run: |
          mage mac
          mkdir -p dist
          # tar preserves the executable bit on the bundled binary.
          tar -czf dist/tidemark-macos-arm64.tar.gz Tidemark.app example-config.json README.md

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-dist
          path: dist/tidemark-macos-arm64.tar.gz

  release:
    needs: package-macos
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install build tools
        run: |
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
          go install github.com/magefile/mage@latest

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $v = (Get-Content versioninfo.json | ConvertFrom-Json).StringFileInfo.ProductVersion
          # Strip a trailing ".0" build segment (1.0.0.0 -> 1.0.0) for a clean base.
          $base = ($v -replace '\.0$', '')
          $tag  = "v$base.${{ github.run_number }}"
          "tag=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Release tag: $tag"

      # Both mage targets emit tidemark.exe, so package each build before the
      # next overwrites it. Each zip is self-contained and runnable on its own.
      - name: Build and package release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          mage release
          Compress-Archive -Path tidemark.exe, example-config.json, README.md `
            -DestinationPath dist/tidemark-windows-amd64.zip -Force

      - name: Build and package debug
        shell: pwsh
        run: |
          mage debug
          Compress-Archive -Path tidemark.exe, example-config.json, README.md `
            -DestinationPath dist/tidemark-windows-amd64-debug.zip -Force

      - name: Download macOS artifact
        uses: actions/download-artifact@v7
        with:
          name: macos-dist
          path: dist

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Tidemark ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/tidemark-windows-amd64.zip
            dist/tidemark-windows-amd64-debug.zip
            dist/tidemark-macos-arm64.tar.gz
