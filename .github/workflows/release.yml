name: Release

# Build a production binary and publish a GitHub Release whenever commits land
# on the default branch. Each push gets a fresh, unique tag derived from the
# version in versioninfo.json plus the workflow run number.
on:
  push:
    branches: ["main"]

# Allow the job to create tags and releases.
permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install build tools
        run: |
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
          go install github.com/magefile/mage@latest

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $json  = Get-Content versioninfo.json | ConvertFrom-Json
          # Take MAJOR.MINOR from versioninfo and use the run number as the
          # PATCH for clean 3-segment semver (e.g. 1.0.0.0 -> v1.0.<run>).
          $parts = $json.StringFileInfo.ProductVersion.Split('.')
          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $patch = [int]"${{ github.run_number }}"
          $tag   = "v$major.$minor.$patch"
          "tag=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Release tag: $tag"

          # Sync the embedded EXE version metadata with the release tag. Windows
          # version fields are 4-part (Major.Minor.Patch.Build); the run number
          # drives Patch and Build stays 0. This edits the CI checkout only, so
          # the repo's versioninfo.json stays a clean template.
          foreach ($info in @($json.FixedFileInfo.FileVersion, $json.FixedFileInfo.ProductVersion)) {
            $info.Major = $major; $info.Minor = $minor; $info.Patch = $patch; $info.Build = 0
          }
          $json.StringFileInfo.ProductVersion = "$major.$minor.$patch.0"
          $json.StringFileInfo.FileVersion    = "$major.$minor.$patch.0"
          $json | ConvertTo-Json -Depth 10 | Set-Content versioninfo.json
          Write-Host "Embedded version: $major.$minor.$patch.0"

      # Both mage targets emit tidemark.exe, so package each build before the
      # next overwrites it. Each zip is self-contained and runnable on its own.
      - name: Build and package release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          mage release
          Compress-Archive -Path tidemark.exe, example-config.json, README.md `
            -DestinationPath dist/tidemark-windows-amd64.zip -Force

      - name: Build and package debug
        shell: pwsh
        run: |
          mage debug
          Compress-Archive -Path tidemark.exe, example-config.json, README.md `
            -DestinationPath dist/tidemark-windows-amd64-debug.zip -Force

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Tidemark ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/tidemark-windows-amd64.zip
            dist/tidemark-windows-amd64-debug.zip
