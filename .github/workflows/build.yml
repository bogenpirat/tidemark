name: Build

on:
  # main is handled by release.yml; avoid building it twice.
  push:
    branches-ignore: ["main"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        include:
          - name: debug
            target: debug
          - name: release
            target: release

    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install build tools
        run: |
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
          go install github.com/magefile/mage@latest

      - name: Build (go generate + go build via mage)
        run: mage ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: tidemark.exe

  build-macos:
    runs-on: macos-latest # Apple Silicon (arm64)
    name: macos

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install build tools
        run: |
          brew install librsvg
          go install github.com/magefile/mage@latest

      - name: Build app bundle (generates icon + cgo/Cocoa build)
        run: mage mac

      # tar (not the zip upload-artifact would make) preserves the executable
      # bit on the Mach-O binary inside the bundle.
      - name: Package
        run: tar -czf tidemark-macos-arm64.tar.gz Tidemark.app example-config.json README.md

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos
          path: tidemark-macos-arm64.tar.gz
