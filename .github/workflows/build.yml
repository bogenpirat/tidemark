name: Build

on:
  # main is handled by release.yml; avoid building it twice.
  push:
    branches-ignore: ["main"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        include:
          - name: debug
            target: debug
          - name: release
            target: release

    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install build tools
        run: |
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
          go install github.com/magefile/mage@latest

      - name: Build (go generate + go build via mage)
        run: mage ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: tidemark.exe
